---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager-rocketchat
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: alertmanager-rocketchat
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        webhook-url: "{{ .ROCKETCHAT_WEBHOOK_URL }}"
  dataFrom:
    - extract:
        key: observability/alertmanager
