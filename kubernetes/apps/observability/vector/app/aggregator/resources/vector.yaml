---
data_dir: /vector-data-dir
api:
  enabled: true
  address: 0.0.0.0:8686

#
# Sources
#

sources:
  journald_source:
    type: vector
    version: "2"
    address: 0.0.0.0:6000

  kubernetes_source:
    type: vector
    version: "2"
    address: 0.0.0.0:6010

  syslog_source:
    type: syslog
    address: 0.0.0.0:6020
    mode: udp

  talos_source:
    type: vector
    version: "2"
    address: 0.0.0.0:6030

#
# Transforms
#

transforms:
  syslog_remap:
    type: remap
    inputs:
      - "syslog_source"
    source: |
      # syslog is near-real-time; use receive time as the timestamp.
      .timestamp = now()
      .hostname = del(.host)

  kubernetes_remap:
    type: remap
    inputs:
      - "kubernetes_source"
    source: |
      # Standardize 'app' index
      .custom_app_name = .pod_labels."app.kubernetes.io/name" || .pod_labels.app || .pod_labels."k8s-app" || "unknown"
      # Drop pod_labels
      del(.pod_labels)

  talos_drop_debug:
    type: filter
    inputs:
      - "talos_source"
    condition: 'downcase(to_string(.level) ?? "") != "debug"'

#
# Sinks
#

sinks:
  journald:
    inputs:
      - "journald_source"
    type: loki
    endpoint: http://loki-gateway.observability.svc.cluster.local
    encoding: {codec: json}
    out_of_order_action: accept
    remove_label_fields: true
    remove_timestamp: true
    labels:
      hostname: '{{ host }}'
      source: 'journald'

  kubernetes:
    inputs:
      - "kubernetes_remap"
    type: loki
    endpoint: http://loki-gateway.observability.svc.cluster.local
    encoding: {codec: json}
    out_of_order_action: accept
    remove_label_fields: true
    remove_timestamp: true
    labels:
      app: '{{ custom_app_name }}'
      namespace: '{{ kubernetes.pod_namespace }}'
      node: '{{ kubernetes.pod_node_name }}'
      source: 'kubernetes'

  syslog:
    inputs:
      - "syslog_remap"
    type: loki
    endpoint: http://loki-gateway.observability.svc.cluster.local
    encoding: {codec: json}
    out_of_order_action: accept
    remove_label_fields: true
    remove_timestamp: true
    labels:
      hostname: '{{ hostname }}'
      source: 'syslog'

  talos:
    inputs:
      - "talos_drop_debug"
    type: loki
    endpoint: http://loki-gateway.observability.svc.cluster.local
    encoding: {codec: json}
    out_of_order_action: accept
    remove_label_fields: true
    remove_timestamp: true
    labels:
      source: 'talos'
      node: '{{ node }}'
      stream: '{{ stream }}'
      service: '{{ service }}'
      level: '{{ level }}'
