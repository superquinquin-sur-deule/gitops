---
# ESO Kubernetes provider: lets ExternalSecrets in any namespace read Secrets
# from the `database` namespace (e.g. Crunchy `pg-main-pguser-*`). Used to bridge
# DB credentials into app namespaces since `secretKeyRef` cannot cross namespaces.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: pg-main-pguser-store
spec:
  provider:
    kubernetes:
      remoteNamespace: database
      server:
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
          namespace: database
      auth:
        serviceAccount:
          name: eso-db-reader
          namespace: external-secrets
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso-db-reader
  namespace: external-secrets
---
# SelfSubjectRulesReview is cluster-scoped; ESO uses it to validate store access.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: eso-db-reader-ssrr
rules:
  - apiGroups:
      - "authorization.k8s.io"
    resources:
      - "selfsubjectrulesreviews"
    verbs:
      - "create"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: eso-db-reader-ssrr
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: eso-db-reader-ssrr
subjects:
  - kind: ServiceAccount
    name: eso-db-reader
    namespace: external-secrets
