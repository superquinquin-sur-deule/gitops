---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keycloak-operator
spec:
  interval: 1h
  chart:
    spec:
      chart: keycloak-operator
      version: 1.35.0-SNAPSHOT.1
      sourceRef:
        kind: HelmRepository
        name: epamedp
  values:
    clusterReconciliationEnabled: true
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        memory: 192Mi
