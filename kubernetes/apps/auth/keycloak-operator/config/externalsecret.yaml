---
# Odoo connection + admin credentials for the Odoo User Storage Provider.
# OpenBao path `keycloak/odoo` must contain: odoo-url, odoo-database, admin-login, admin-password.
# Consumed by the KeycloakRealmComponent via EDP `$secretName:key` references.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-odoo
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: keycloak-odoo
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: keycloak/odoo
