---
# Connection to the in-cluster Keycloak server. Authenticates as the bootstrap
# admin (kcadmin) of the master realm via password grant (admin-cli).
apiVersion: v1.edp.epam.com/v1
kind: Keycloak
metadata:
  name: surdeule
spec:
  url: http://keycloak.auth.svc.cluster.local:8080
  auth:
    passwordGrant:
      username:
        value: kcadmin
      passwordRef:
        name: keycloak-admin
        key: password
