---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openbao-oidc
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: openbao-oidc
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        CLIENT_SECRET: "{{ .CLIENT_SECRET }}"
  dataFrom:
    - extract:
        key: openbao/auth
