---
apiVersion: batch/v1
kind: Job
metadata:
  name: openbao-bootstrap
  annotations:
    kustomize.toolkit.fluxcd.io/force: "true"
spec:
  backoffLimit: 12
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openbao-bootstrap
    spec:
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          image: quay.io/openbao/openbao:2.5.5
          env:
            - name: VAULT_ADDR
              value: http://openbao.openbao.svc.cluster.local:8200
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openbao-unseal
                  key: ROOT_TOKEN
            - name: SECRET_DOMAIN
              valueFrom:
                secretKeyRef:
                  name: cluster-secrets
                  key: SECRET_DOMAIN
          command:
            - /bin/sh
            - -ec
            - |
              echo "Waiting for OpenBao to be reachable, unsealed, and token to be valid..."
              tries=0
              until bao token lookup >/dev/null 2>&1; do
                tries=$((tries+1))
                if [ "$tries" -gt 120 ]; then
                  echo "ERROR: token never became valid after 20 minutes" >&2
                  exit 1
                fi
                sleep 10
              done
              echo "OpenBao ready. Configuring..."

              echo "==> Ensuring KV v2 enabled at apps/"
              if ! bao secrets list -format=json | grep -q '"apps/"'; then
                bao secrets enable -path=apps -version=2 kv
              else
                echo "    already enabled"
              fi

              echo "==> Writing policy eso-reader"
              bao policy write eso-reader - <<'EOF'
              path "apps/data/*" {
                capabilities = ["read"]
              }
              path "apps/metadata/*" {
                capabilities = ["list", "read"]
              }
              EOF

              echo "==> Ensuring Kubernetes auth method enabled"
              if ! bao auth list -format=json | grep -q '"kubernetes/"'; then
                bao auth enable kubernetes
              else
                echo "    already enabled"
              fi

              echo "==> Configuring Kubernetes auth method"
              bao write auth/kubernetes/config \
                kubernetes_host="https://kubernetes.default.svc:443" \
                disable_iss_validation=true

              echo "==> Creating role eso-reader"
              bao write auth/kubernetes/role/eso-reader \
                bound_service_account_names=external-secrets \
                bound_service_account_namespaces=external-secrets \
                policies=eso-reader \
                ttl=1h

              echo "==> Ensuring OIDC auth method enabled"
              if ! bao auth list -format=json | grep -q '"oidc/"'; then
                bao auth enable oidc
              else
                echo "    already enabled"
              fi

              echo "==> Exposing OIDC on the unauthenticated login screen"
              bao auth tune -listing-visibility="unauth" oidc/

              echo "==> Writing policy oidc-admin"
              bao policy write oidc-admin - <<'EOF'
              path "apps/*" {
                capabilities = ["create", "read", "update", "delete", "list"]
              }
              path "secret/*" {
                capabilities = ["create", "read", "update", "delete", "list"]
              }
              path "sys/mounts" {
                capabilities = ["read", "list"]
              }
              path "sys/mounts/*" {
                capabilities = ["read", "list"]
              }
              path "sys/auth" {
                capabilities = ["read", "list"]
              }
              path "sys/policies/acl" {
                capabilities = ["read", "list"]
              }
              path "sys/policies/acl/*" {
                capabilities = ["create", "read", "update", "delete", "list"]
              }
              path "auth/*" {
                capabilities = ["create", "read", "update", "delete", "list"]
              }
              EOF

              echo "==> Reading OIDC client secret from apps/openbao/auth"
              CLIENT_SECRET="$(bao kv get -field=CLIENT_SECRET apps/openbao/auth 2>/dev/null || true)"
              if [ -z "$CLIENT_SECRET" ]; then
                echo "    WARNING: apps/openbao/auth CLIENT_SECRET not found — skipping OIDC config."
                echo "    Seed it then re-run: bao kv put apps/openbao/auth CLIENT_SECRET=<value>"
              else
                echo "==> Configuring OIDC auth method"
                bao write auth/oidc/config \
                  oidc_discovery_url="https://auth.${SECRET_DOMAIN}/realms/surdeule" \
                  oidc_client_id="openbao" \
                  oidc_client_secret="$CLIENT_SECRET" \
                  default_role="admin"

                echo "==> Creating OIDC role admin"
                bao write auth/oidc/role/admin - <<EOF
              {
                "user_claim": "preferred_username",
                "bound_audiences": ["openbao"],
                "allowed_redirect_uris": [
                  "https://bao.${SECRET_DOMAIN}/ui/vault/auth/oidc/oidc/callback",
                  "http://localhost:8250/oidc/callback"
                ],
                "bound_claims": {"roles": ["Foodcoop Admin"]},
                "oidc_scopes": ["openid", "profile", "email"],
                "token_policies": ["oidc-admin"],
                "token_ttl": "1h"
              }
              EOF
              fi

              echo "Bootstrap complete."
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - "ALL"
      securityContext:
        runAsNonRoot: true
        runAsUser: 100
        runAsGroup: 1000
