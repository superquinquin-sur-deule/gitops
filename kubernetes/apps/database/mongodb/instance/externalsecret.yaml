---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mongodb-admin-password
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: mongodb-admin-password
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        password: "{{ .admin_password }}"
  dataFrom:
    - extract:
        key: database/mongodb
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mongodb-rocketchat-password
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: mongodb-rocketchat-password
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        password: "{{ .rocketchat_password }}"
  dataFrom:
    - extract:
        key: database/mongodb
