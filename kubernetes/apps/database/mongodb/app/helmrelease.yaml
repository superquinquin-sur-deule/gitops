---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mongodb-operator
spec:
  chart:
    spec:
      chart: mongodb-kubernetes
      version: 1.8.1
      sourceRef:
        kind: HelmRepository
        name: mongodb
  interval: 1h
  values:
    operator:
      watchNamespace: "database"
      resources:
        requests:
          cpu: 100m
          memory: 200Mi
        limits:
          cpu: 500m
          memory: 500Mi
