---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: mongodb-operator
spec:
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: mongodb-operator
      namespace: database
  interval: 1h
  path: ./kubernetes/apps/database/mongodb/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: database
  wait: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: mongodb-instance
spec:
  dependsOn:
    - name: mongodb-operator
    - name: external-secrets-stores
      namespace: external-secrets
  interval: 1h
  path: ./kubernetes/apps/database/mongodb/instance
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: database
  healthCheckExprs:
    - apiVersion: mongodbcommunity.mongodb.com/v1
      kind: MongoDBCommunity
      failed: status.phase == 'Failed'
      current: status.phase == 'Running'
  wait: false
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: mongodb-backup
spec:
  dependsOn:
    - name: mongodb-instance
  interval: 1h
  path: ./kubernetes/apps/database/mongodb/backup
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: database
  wait: false
