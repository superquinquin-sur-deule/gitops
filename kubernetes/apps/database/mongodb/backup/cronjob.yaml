---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: mongodb-backup
spec:
  schedule: "30 2 * * *"
  timeZone: Europe/Paris
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: mongodb-backup
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
            fsGroup: 999
          containers:
            - name: mongodump
              image: mongo:8.0
              imagePullPolicy: IfNotPresent
              env:
                - name: MONGODB_URI
                  valueFrom:
                    secretKeyRef:
                      name: mongodb-admin-connection
                      key: connectionString.standard
                - name: RETENTION_DAYS
                  value: "14"
              command:
                - /bin/bash
                - -euo
                - pipefail
                - -c
                - |
                  ts="$(date +%Y-%m-%d-%H%M%S)"
                  archive="/backup/mongodb-$${ts}.archive.gz"
                  echo "Dumping replica set -> $archive"
                  mongodump --uri="$MONGODB_URI" \
                    --archive="$archive" \
                    --gzip \
                    --oplog \
                    --readPreference=secondaryPreferred
                  echo "Pruning archives older than $${RETENTION_DAYS} days"
                  find /backup -maxdepth 1 -name 'mongodb-*.archive.gz' \
                    -mtime +$${RETENTION_DAYS} -delete
                  echo "Backup complete"
              volumeMounts:
                - name: backup
                  mountPath: /backup
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  memory: 1Gi
          volumes:
            - name: backup
              persistentVolumeClaim:
                claimName: mongodb-backup
