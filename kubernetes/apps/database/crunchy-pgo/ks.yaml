---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: crunchy-pgo
spec:
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: crunchy-pgo
      namespace: database
  interval: 1h
  path: ./kubernetes/apps/database/crunchy-pgo/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: database
  wait: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: pg-main
spec:
  dependsOn:
    - name: crunchy-pgo
  interval: 1h
  path: ./kubernetes/apps/database/crunchy-pgo/main
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: database
  wait: false
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: crunchy-users
spec:
  dependsOn:
    - name: crunchy-pgo
  interval: 1h
  path: ./kubernetes/apps/database/crunchy-pgo/crunchy-users
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: database
  wait: false
