---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pg-immich-pgbackrest-nfs
  labels:
    app.kubernetes.io/component: pg-immich-pgbackrest-repo
spec:
  capacity:
    storage: 50Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  mountOptions:
    - nfsvers=4.1
    - hard
  nfs:
    server: 192.168.7.50
    path: /volume1/backup/postgres/pg-immich
