---
# Allows the External Secrets Operator (via the `eso-db-reader` ServiceAccount in
# the external-secrets namespace) to read the Crunchy-generated `pg-main-pguser-*`
# Secrets from this `database` namespace, so they can be mirrored into app
# namespaces through the `kubernetes-database` ClusterSecretStore.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: eso-db-reader
  namespace: database
rules:
  - apiGroups:
      - ""
    resources:
      - "secrets"
    verbs:
      - "get"
      - "list"
      - "watch"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: eso-db-reader
  namespace: database
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: eso-db-reader
subjects:
  - kind: ServiceAccount
    name: eso-db-reader
    namespace: external-secrets
