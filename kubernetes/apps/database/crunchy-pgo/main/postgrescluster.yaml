---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/postgres-operator.crunchydata.com/postgrescluster_v1beta1.json
apiVersion: postgres-operator.crunchydata.com/v1beta1
kind: PostgresCluster
metadata:
  name: pg-main
  labels:
    crunchy-users.henrywhitaker3.github.com/watch: "true"
  annotations:
    crunchy-users.henrywhitaker3.github.com/superuser: "postgres"
spec:
  postgresVersion: 16
  image: registry.developers.crunchydata.com/crunchydata/crunchy-postgres:ubi9-16.13-2610

  users:
    - name: "postgres"
      databases:
        - "postgres"
      options: "SUPERUSER"
      password:
        type: AlphaNumeric
    - name: keycloak
      databases:
        - keycloak
    - name: outline
      databases:
        - outline

  service:
    type: LoadBalancer
    metadata:
      annotations:
        lbipam.cilium.io/ips: "192.168.7.48"
        external-dns.alpha.kubernetes.io/hostname: main.postgres.${SECRET_DOMAIN}

  patroni:
    dynamicConfiguration:
      synchronous_mode: true
      postgresql:
        parameters:
          max_connections: 300
        max_wal_size: 5GB
        synchronous_commit: "on"
        pg_hba:
          - hostnossl all all 10.42.0.0/16 md5
          - hostssl all all all md5

  instances:
    - name: main
      replicas: 3
      dataVolumeClaimSpec:
        accessModes:
          - "ReadWriteOnce"
        storageClassName: openebs-hostpath
        resources:
          requests:
            storage: 20Gi
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 1
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    postgres-operator.crunchydata.com/cluster: pg-main
                    postgres-operator.crunchydata.com/instance-set: main

  backups:
    pgbackrest:
      image: registry.developers.crunchydata.com/crunchydata/crunchy-pgbackrest:ubi9-2.58.0-2610
      global:
        compress-type: "bz2"
        compress-level: "9"
        repo1-block: "y"
        repo1-bundle: "y"
        repo1-path: /pgbackrest/repo1/crunchy-pgo
        repo1-retention-full: "30" # days
        repo1-retention-full-type: "time"
      repos:
        - name: repo1
          schedules:
            full: "30 1 * * 0" # Sunday at 01:30
            differential: "30 1 * * 1-6" # Mon-Sat at 01:30
            incremental: "30 2-23 * * *" # Every hour except 01:30
          volume:
            volumeClaimSpec:
              storageClassName: ""
              accessModes:
                - ReadWriteMany
              resources:
                requests:
                  storage: 100Gi
              selector:
                matchLabels:
                  app.kubernetes.io/component: pg-main-pgbackrest-repo

  monitoring:
    pgmonitor:
      exporter:
        resources:
          requests:
            cpu: 10m
            memory: 64M
          limits:
            memory: 512M
