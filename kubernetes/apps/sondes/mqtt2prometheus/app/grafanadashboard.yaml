---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/grafana.integreatly.org/grafanadashboard_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: sondes-temperatures
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      dashboards: grafana
  datasources:
    - datasourceName: prometheus
      inputName: DS_PROMETHEUS
  json: |
    {
      "uid": "sondes-temperatures",
      "title": "Sondes — Frigos & Congélateurs",
      "tags": ["sondes", "zigbee", "temperature"],
      "timezone": "browser",
      "editable": true,
      "schemaVersion": 39,
      "version": 3,
      "refresh": "1m",
      "time": { "from": "now-24h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "sensor",
            "label": "Sonde",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "$${DS_PROMETHEUS}" },
            "query": "label_values(temperature, sensor)",
            "definition": "label_values(temperature, sensor)",
            "includeAll": true,
            "multi": true,
            "allValue": ".*",
            "current": { "text": "All", "value": "$$__all" },
            "refresh": 2,
            "sort": 1
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "row",
          "title": "Vue d'ensemble",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 }
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Température actuelle",
          "datasource": { "type": "prometheus", "uid": "$${DS_PROMETHEUS}" },
          "gridPos": { "h": 6, "w": 24, "x": 0, "y": 1 },
          "fieldConfig": {
            "defaults": {
              "unit": "celsius",
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "blue", "value": null },
                  { "color": "green", "value": -25 },
                  { "color": "yellow", "value": 8 },
                  { "color": "red", "value": 12 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "value_and_name",
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto"
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "$${DS_PROMETHEUS}" },
              "expr": "temperature{sensor=~\"$$sensor\"}",
              "legendFormat": "{{sensor}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 10,
          "type": "row",
          "title": "Congélateurs",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 7 }
        },
        {
          "id": 12,
          "type": "stat",
          "title": "Statut — congélateurs",
          "description": "OK: < -15°C · WARN: -15°C à -14°C · ALERTE: > -14°C (seuil hygiène & sécurité)",
          "datasource": { "type": "prometheus", "uid": "$${DS_PROMETHEUS}" },
          "gridPos": { "h": 4, "w": 24, "x": 0, "y": 8 },
          "fieldConfig": {
            "defaults": {
              "unit": "celsius",
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": -15 },
                  { "color": "red", "value": -14 }
                ]
              },
              "mappings": [
                { "type": "range", "options": { "from": -273, "to": -15, "result": { "text": "OK", "color": "green", "index": 0 } } },
                { "type": "range", "options": { "from": -15, "to": -14, "result": { "text": "WARN", "color": "yellow", "index": 1 } } },
                { "type": "range", "options": { "from": -14, "to": 1000, "result": { "text": "ALERTE", "color": "red", "index": 2 } } }
              ]
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "value_and_name",
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto"
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "$${DS_PROMETHEUS}" },
              "expr": "temperature{sensor=~\"temp_congelateur_.*\", sensor=~\"$$sensor\"}",
              "legendFormat": "{{sensor}}",
              "refId": "A"
            }
          ]
        },
