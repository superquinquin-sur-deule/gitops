---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mqtt2prometheus-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: mqtt2prometheus-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        MQTT2PROM_MQTT_USER: "{{ .username }}"
        MQTT2PROM_MQTT_PASSWORD: "{{ .password }}"
  dataFrom:
    - extract:
        key: sondes/mqtt
