---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hajimari
spec:
  chart:
    spec:
      chart: hajimari
      version: 2.0.2
      sourceRef:
        kind: HelmRepository
        name: hajimari
  interval: 1h
  values:
    env:
      TZ: Europe/Paris
    hajimari:
      title: Superquinquin-sur-Deûle
      defaultEnable: true
      alwaysTargetBlank: true
      namespaceSelector:
        any: true
    persistence:
      data:
        enabled: false
    ingress:
      main:
        enabled: false
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        memory: 128Mi
