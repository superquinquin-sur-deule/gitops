---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: sesame
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: sesame-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        ODOO_URL: "{{ .ODOO_URL }}"
        ODOO_DATABASE: "{{ .ODOO_DATABASE }}"
        ODOO_LOGIN: "{{ .ODOO_LOGIN }}"
        ODOO_PASSWORD: "{{ .ODOO_PASSWORD }}"
  dataFrom:
    - extract:
        key: common/odoo
