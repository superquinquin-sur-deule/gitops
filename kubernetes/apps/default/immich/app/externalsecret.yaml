---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: immich-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: immich-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # Consumed by the KeycloakClient (via $$immich-secret:OIDC_CLIENT_SECRET)
        OIDC_CLIENT_SECRET: "{{ .OIDC_CLIENT_SECRET }}"
        # Crunchy pg-immich "immich" user (cross-namespace via pg-main-pguser-store)
        DB_URL: "postgresql://{{ .user }}:{{ .password }}@{{ .host }}:{{ .port }}/{{ .dbname }}"
  dataFrom:
    - extract:
        key: default/immich
    - extract:
        key: pg-immich-pguser-immich
      sourceRef:
        storeRef:
          kind: ClusterSecretStore
          name: pg-main-pguser-store
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: immich-config
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: immich-config
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        immich-config.yaml: |
          server:
            externalDomain: https://photos.${SECRET_DOMAIN}
          machineLearning:
            enabled: false
          passwordLogin:
            enabled: false
          oauth:
            enabled: true
            issuerUrl: https://auth.${SECRET_DOMAIN}/realms/surdeule
            clientId: immich
            clientSecret: "{{ .OIDC_CLIENT_SECRET }}"
            scope: openid email profile
            buttonText: Se connecter avec Superquinquin
            autoRegister: true
            autoLaunch: true
            storageLabelClaim: preferred_username
  dataFrom:
    - extract:
        key: default/immich
