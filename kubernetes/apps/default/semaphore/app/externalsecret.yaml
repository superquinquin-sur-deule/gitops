---
# ExternalSecret 1: PostgreSQL credentials from Crunchy operator
# Pulled from Kubernetes ClusterSecretStore (cross-namespace bridge)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: semaphore-db
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: pg-main-pguser-store
  target:
    name: semaphore-db
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        db_host: "pg-main-rw.database.svc.cluster.local"
        db_port: "5432"
        db_name: "semaphore"
        db_user: "{{ .username }}"
        db_password: "{{ .password }}"
  dataFrom:
    - extract:
        key: pg-main-pguser-semaphore

---
# ExternalSecret 2: OIDC + OpenBao tokens from OpenBao vault
# Pulled from OpenBao ClusterSecretStore at path: apps/default/semaphore-ui
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: semaphore-oidc
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: semaphore-oidc
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        OIDC_CLIENT_SECRET: "{{ .OIDC_CLIENT_SECRET }}"
        VAULT_TOKEN: "{{ .VAULT_TOKEN }}"
  dataFrom:
    - extract:
        key: apps/default/semaphore-ui
