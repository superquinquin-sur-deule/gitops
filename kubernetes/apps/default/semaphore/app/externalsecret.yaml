---
# ExternalSecret: Combined database + application secrets
# Sources:
#   1. Crunchy PostgreSQL credentials (pg-main user "semaphore")
#   2. OpenBao application secrets (OIDC + Vault token)
# Pattern: Same as Outline, Immich (fusion of DB + app secrets)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: semaphore-db
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: semaphore-db
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # PostgreSQL connection details (env vars for Semaphore)
        db_host: "{{ .host }}"
        db_port: "{{ .port }}"
        db_name: "{{ .dbname }}"
        db_user: "{{ .user }}"
        db_password: "{{ .password }}"
        # OIDC + Vault (env vars for Semaphore and playbooks)
        OIDC_CLIENT_SECRET: "{{ .OIDC_CLIENT_SECRET }}"
        VAULT_TOKEN: "{{ .VAULT_TOKEN }}"
  dataFrom:
    # PostgreSQL credentials from Crunchy operator
    - extract:
        key: pg-main-pguser-semaphore
      sourceRef:
        storeRef:
          kind: ClusterSecretStore
          name: pg-main-pguser-store
    # Application secrets from OpenBao
    - extract:
        key: apps/default/semaphore-ui
