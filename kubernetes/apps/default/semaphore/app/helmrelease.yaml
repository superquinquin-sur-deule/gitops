---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: semaphore
spec:
  chart:
    spec:
      chart: semaphore
      version: "16.2.2"
      sourceRef:
        kind: HelmRepository
        name: semaphoreui
  interval: 1h
  values:
    replicaCount: 1

    image:
      repository: semaphoreui/semaphore
      tag: "2.18.3"
      pullPolicy: IfNotPresent

    # Pod annotations for auto-reload on secret changes (via Reloader)
    podAnnotations:
      reloader.stakater.com/auto: "true"

    # Database configuration
    postgres:
      host: pg-main-rw.database.svc.cluster.local
      port: 5432
      driver: postgres

    # Service
    service:
      type: ClusterIP
      port: 3000
      targetPort: 3000

    # No ingress - using HTTPRoute instead
    ingress:
      enabled: false

    # Environment variables
    env:
      # Database connection (from semaphore-db ExternalSecret)
      - name: SEMAPHORE_DB_DIALECT
        value: postgres
      - name: SEMAPHORE_DB_HOST
        valueFrom:
          secretKeyRef:
            name: semaphore-db
            key: db_host
      - name: SEMAPHORE_DB_PORT
        valueFrom:
          secretKeyRef:
            name: semaphore-db
            key: db_port
      - name: SEMAPHORE_DB_USER
        valueFrom:
          secretKeyRef:
            name: semaphore-db
            key: db_user
      - name: SEMAPHORE_DB_PASS
        valueFrom:
          secretKeyRef:
            name: semaphore-db
            key: db_password
      - name: SEMAPHORE_DB
        valueFrom:
          secretKeyRef:
            name: semaphore-db
            key: db_name

      # OIDC Configuration (Keycloak)
      - name: SEMAPHORE_OIDC_PROVIDER_URL
        value: "https://auth.${SECRET_DOMAIN}/realms/surdeule"
      - name: SEMAPHORE_OIDC_CLIENT_ID
        value: semaphore
      - name: SEMAPHORE_OIDC_CLIENT_SECRET
        valueFrom:
          secretKeyRef:
            name: semaphore-db
            key: OIDC_CLIENT_SECRET
      - name: SEMAPHORE_OIDC_REDIRECT_URL
        value: "https://semaphore.${SECRET_DOMAIN}/api/auth/oidc/keycloak/redirect"
      - name: SEMAPHORE_OIDC_TOKEN_URL
        value: "https://auth.${SECRET_DOMAIN}/realms/surdeule/protocol/openid-connect/token"
      - name: SEMAPHORE_OIDC_AUTH_URL
        value: "https://auth.${SECRET_DOMAIN}/realms/surdeule/protocol/openid-connect/auth"
      - name: SEMAPHORE_OIDC_USERINFO_URL
        value: "https://auth.${SECRET_DOMAIN}/realms/surdeule/protocol/openid-connect/userinfo"

      # Vault/OpenBao integration for playbooks
      - name: SEMAPHORE_VAULT_ADDR
        value: "https://bao.${SECRET_DOMAIN}"
      - name: SEMAPHORE_VAULT_TOKEN
        valueFrom:
          secretKeyRef:
            name: semaphore-db
            key: VAULT_TOKEN

    # Health probes (endpoint: /api/ping)
    livenessProbe:
      httpGet:
        path: /api/ping
        port: 3000
      initialDelaySeconds: 30
      periodSeconds: 10
      failureThreshold: 3

    readinessProbe:
      httpGet:
        path: /api/ping
        port: 3000
      initialDelaySeconds: 10
      periodSeconds: 5
      failureThreshold: 3

    startupProbe:
      httpGet:
        path: /api/ping
        port: 3000
      periodSeconds: 10
      failureThreshold: 30

    # Resource requests/limits
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
