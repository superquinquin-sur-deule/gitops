---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: semaphore
spec:
  chart:
    spec:
      chart: semaphore
      version: "16.2.2"
      sourceRef:
        kind: HelmRepository
        name: semaphoreui
  interval: 1h
  values:
    replicaCount: 1

    image:
      repository: semaphoreui/semaphore
      tag: "latest"
      pullPolicy: IfNotPresent

    # Pod annotations for auto-reload on secret changes (via Reloader)
    podAnnotations:
      reloader.stakater.com/auto: "true"

    # Service
    service:
      type: ClusterIP
      port: 3000
      targetPort: 3000

    # No ingress - using HTTPRoute instead
    ingress:
      enabled: false

    # Secrets injection: Load all keys from semaphore-db secret as env vars
    # This includes: db_host, db_port, db_name, db_user, db_password,
    # OIDC_CLIENT_SECRET, VAULT_TOKEN
    envFrom:
      - secretRef:
          name: semaphore-db

    # Environment variables (static URLs, config)
    env:
      # Database dialect (Semaphore will read host/port/user/pass/db from env vars)
      - name: SEMAPHORE_DB_DIALECT
        value: postgres

      # OIDC Configuration (Keycloak)
      - name: SEMAPHORE_OIDC_PROVIDER_URL
        value: "https://auth.${SECRET_DOMAIN}/realms/surdeule"
      - name: SEMAPHORE_OIDC_CLIENT_ID
        value: semaphore
      - name: SEMAPHORE_OIDC_REDIRECT_URL
        value: "https://semaphore.${SECRET_DOMAIN}/api/auth/oidc/keycloak/redirect"
      - name: SEMAPHORE_OIDC_TOKEN_URL
        value: "https://auth.${SECRET_DOMAIN}/realms/surdeule/protocol/openid-connect/token"
      - name: SEMAPHORE_OIDC_AUTH_URL
        value: "https://auth.${SECRET_DOMAIN}/realms/surdeule/protocol/openid-connect/auth"
      - name: SEMAPHORE_OIDC_USERINFO_URL
        value: "https://auth.${SECRET_DOMAIN}/realms/surdeule/protocol/openid-connect/userinfo"

      # Vault/OpenBao integration for playbooks
      - name: SEMAPHORE_VAULT_ADDR
        value: "https://bao.${SECRET_DOMAIN}"
        # NOTE: SEMAPHORE_VAULT_TOKEN and SEMAPHORE_OIDC_CLIENT_SECRET are loaded
        # from the secret via envFrom: secretRef (no duplication needed)

    # Health probes (endpoint: /api/ping)
    livenessProbe:
      httpGet:
        path: /api/ping
        port: 3000
      initialDelaySeconds: 30
      periodSeconds: 10
      failureThreshold: 3

    readinessProbe:
      httpGet:
        path: /api/ping
        port: 3000
      initialDelaySeconds: 10
      periodSeconds: 5
      failureThreshold: 3

    startupProbe:
      httpGet:
        path: /api/ping
        port: 3000
      periodSeconds: 10
      failureThreshold: 30

    # Resource requests/limits
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
