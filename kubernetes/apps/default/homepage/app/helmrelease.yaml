---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homepage
spec:
  chart:
    spec:
      chart: homepage
      version: 2.1.0
      sourceRef:
        kind: HelmRepository
        name: homepage
  interval: 1h
  values:
    image:
      repository: ghcr.io/gethomepage/homepage
      tag: v1.13.2

    enableRbac: true
    serviceAccount:
      create: true

    env:
      - name: TZ
        value: Europe/Paris
      - name: HOMEPAGE_ALLOWED_HOSTS
        value: "homepage.${SECRET_DOMAIN}"

    config:
      kubernetes:
        mode: cluster
        gateway: true

      settingsString: |
        title: Superquinquin-sur-Deûle
        headerStyle: boxed
        theme: dark
        color: slate
        target: _blank
        layout:
          Superquinquin:
            style: row
            columns: 4
          Infrastructure:
            style: row
            columns: 4

      bookmarks: []

      services:
        - Magasin:
            - Sondes:
                href: https://grafana.${SECRET_DOMAIN}/goto/efpwy89obsnb4c?orgId=1
                description: Mesures de température des Congélateurs/Frigos
        - Salariées:
            - Odoo:
                href: https://gestion-sdl.${SQQ_DOMAIN}
                description: ERP
            - Métabase:
                href: https://metabase-deule.${SQQ_DOMAIN}
                description: Statistiques
      widgets:
        - greeting:
            text_size: xl
            text: Superquinquin-sur-Deûle
        - datetime:
            text_size: xl
            format:
              dateStyle: long
              timeStyle: short
              hourCycle: h23
        - search:
            provider: duckduckgo
            target: _blank
        - kubernetes:
            cluster:
              show: true
              cpu: true
              memory: true
              showLabel: true
              label: cluster
            nodes:
              show: false

    ingress:
      main:
        enabled: false

    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        memory: 256Mi
