---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app immich-drop
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: *app
  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    controllers:
      main:
        replicas: 1
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          main:
            image:
              repository: ghcr.io/nasogaa/immich-drop
              tag: v0.5.0

            env:
              IMMICH_BASE_URL: http://immich-server:2283/api
              PUBLIC_BASE_URL: "https://photo-drop.${SECRET_DOMAIN}"
              PUBLIC_UPLOAD_PAGE_ENABLED: "false"
              CHUNKED_UPLOADS_ENABLED: "true"
              CHUNK_SIZE_MB: "95"
              MAX_CONCURRENT: "3"
              STATE_DB: /data/state.db
              LOG_LEVEL: INFO

            envFrom:
              - secretRef:
                  name: immich-drop-secret

            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 512Mi

    service:
      main:
        controller: main
        ports:
          http:
            port: &port 8080

    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: Immich Drop
          gethomepage.dev/group: Superquinquin
          gethomepage.dev/icon: immich.png
          gethomepage.dev/description: Dépôt de photos
          gethomepage.dev/external: "true"
        hostnames:
          - "photo-drop.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-external
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: *app
                port: *port

    persistence:
      data:
        existingClaim: *app
        globalMounts:
          - path: /data
