---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rocketchat
spec:
  chart:
    spec:
      chart: rocketchat
      version: 6.32.1
      sourceRef:
        kind: HelmRepository
        name: rocketchat
  interval: 1h
  values:
    host: lechat.${SECRET_DOMAIN}
    replicaCount: 1
    mongodb:
      enabled: false
    existingMongodbSecret: rocketchat-mongodb
    microservices:
      enabled: false
    service:
      type: ClusterIP
      port: 80
    ingress:
      enabled: false
    persistence:
      enabled: true
      storageClass: ceph-block
      size: 10Gi
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi
    extraEnv: |
      - name: ROOT_URL
        value: https://lechat.${SECRET_DOMAIN}
