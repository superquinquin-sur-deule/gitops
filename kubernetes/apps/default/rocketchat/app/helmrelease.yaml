---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rocketchat
spec:
  chart:
    spec:
      chart: rocketchat
      version: 7.0.1
      sourceRef:
        kind: HelmRepository
        name: rocketchat
  interval: 1h
  values:
    host: lechat.${SECRET_DOMAIN}
    replicaCount: 1
    # Pinned to 8.1.5 (chart 6.32.1 default appVersion is 8.2.0). 8.2.0 added an
    # SSRF firewall but does not pass SSRF_Allowlist to Custom OAuth fetches, so
    # Keycloak SSO fails with error-ssrf-validation-failed. Fix is unreleased PR
    # RocketChat/Rocket.Chat#40587 — bump back to 8.2.x once it ships in a release.
    # Migration-safe: 8.1.5 and 8.2.0 are both at DB migration v335.
    image:
      tag: "8.1.5"
    podAnnotations:
      reloader.stakater.com/auto: "true"
    mongodb:
      enabled: false
    existingMongodbSecret: rocketchat-mongodb
    extraEnv:
      # Inert on 8.1.5 (no SSRF firewall). Kept so the eventual re-upgrade to a
      # release containing RocketChat/Rocket.Chat#40587 works without changes:
      # then this allowlists the internal-resolving auth.${SECRET_DOMAIN} host for
      # the server-side OAuth token/userinfo exchange.
      - name: "OVERWRITE_SETTING_SSRF_Allowlist"
        value: "auth.${SECRET_DOMAIN}"
      - name: "OVERWRITE_SETTING_Accounts_OAuth_Custom-Keycloak"
        value: "true"
      - name: "OVERWRITE_SETTING_Accounts_OAuth_Custom-Keycloak-url"
        value: "https://auth.${SECRET_DOMAIN}/realms/surdeule/protocol/openid-connect"
      - name: "OVERWRITE_SETTING_Accounts_OAuth_Custom-Keycloak-token_path"
        value: "/token"
      - name: "OVERWRITE_SETTING_Accounts_OAuth_Custom-Keycloak-token_sent_via"
        value: "header"
      - name: "OVERWRITE_SETTING_Accounts_OAuth_Custom-Keycloak-identity_token_sent_via"
        value: "default"
      - name: "OVERWRITE_SETTING_Accounts_OAuth_Custom-Keycloak-identity_path"
        value: "/userinfo"
      - name: "OVERWRITE_SETTING_Accounts_OAuth_Custom-Keycloak-authorize_path"
        value: "/auth"
      - name: "OVERWRITE_SETTING_Accounts_OAuth_Custom-Keycloak-scope"
        value: "openid email profile"
      - name: "OVERWRITE_SETTING_Accounts_OAuth_Custom-Keycloak-access_token_param"
        value: "access_token"
      - name: "OVERWRITE_SETTING_Accounts_OAuth_Custom-Keycloak-id"
        value: "rocketchat"
      - name: "OVERWRITE_SETTING_Accounts_OAuth_Custom-Keycloak-secret"
        valueFrom:
          secretKeyRef:
            name: rocketchat-oidc
            key: OIDC_CLIENT_SECRET
      - name: "OVERWRITE_SETTING_Accounts_OAuth_Custom-Keycloak-login_style"
        value: "redirect"
      - name: "OVERWRITE_SETTING_Accounts_OAuth_Custom-Keycloak-button_label_text"
        value: "Se connecter avec SuperQuinquin"
      - name: "OVERWRITE_SETTING_Accounts_OAuth_Custom-Keycloak-button_color"
        value: "#1465B7"
      - name: "OVERWRITE_SETTING_Accounts_OAuth_Custom-Keycloak-button_label_color"
        value: "#FFFFFF"
      - name: "OVERWRITE_SETTING_Accounts_OAuth_Custom-Keycloak-username_field"
        value: "prenomnom"
      - name: "OVERWRITE_SETTING_Accounts_OAuth_Custom-Keycloak-email_field"
        value: "email"
      - name: "OVERWRITE_SETTING_Accounts_OAuth_Custom-Keycloak-name_field"
        value: "name"
      - name: "OVERWRITE_SETTING_Accounts_OAuth_Custom-Keycloak-merge_users"
        value: "true"
      - name: "OVERWRITE_SETTING_Accounts_OAuth_Custom-Keycloak-show_button"
        value: "true"
    microservices:
      enabled: false
    service:
      type: ClusterIP
      port: 80
    ingress:
      enabled: false
    persistence:
      enabled: true
      storageClass: ceph-block
      size: 10Gi
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi
