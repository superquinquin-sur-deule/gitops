---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: reset-ftop-counter
spec:
  schedule: "0 3 * * *"
  timeZone: Europe/Paris
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: odoo-cli
              image: docker.io/library/debian:bookworm-slim
              imagePullPolicy: IfNotPresent
              envFrom:
                - secretRef:
                    name: odoo-cli-secret
              command:
                - /bin/bash
                - -euo
                - pipefail
                - -c
                - |
                  apt-get update -qq
                  apt-get install -y -qq --no-install-recommends curl ca-certificates tzdata >/dev/null
                  export TZ=Europe/Paris
                  # renovate: datasource=github-releases depName=superquinquin-sur-deule/odoo-cli
                  version="0.13.0"
                  url="https://github.com/superquinquin-sur-deule/odoo-cli/releases/download/v$version/odoo-cli-$version-linux-x86_64"
                  curl -fsSL -o /usr/local/bin/odoo-cli "$url"
                  chmod +x /usr/local/bin/odoo-cli
                  echo "Running cooperators reset-ftop-counter"
                  exec odoo-cli cooperators reset-ftop-counter
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  memory: 512Mi
