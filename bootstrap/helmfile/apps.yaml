---
# yaml-language-server: $schema=https://json.schemastore.org/helmfile

# Bootstraps core applications that provide a minimal runtime base for the
# cluster. These releases are installed first so the cluster has the resources
# Flux needs before its own reconciliation begins.
#
# After this bootstrap phase, Flux is ready to take over management of the
# application stack and continue reconciling downstream state.

bases:
  - defaults.yaml

helmDefaults:
  cleanupOnFail: true
  forceConflicts: true
  wait: true
  waitForJobs: true

releases:
  - name: cilium
    namespace: kube-system
    inherit:
      - template: default

  - name: coredns
    namespace: kube-system
    inherit:
      - template: default
    needs:
      - 'kube-system/cilium'

  - name: spegel
    namespace: kube-system
    inherit:
      - template: default
    needs:
      - 'kube-system/coredns'

  - name: cert-manager
    namespace: cert-manager
    inherit:
      - template: default
    needs:
      - 'kube-system/spegel'

  - name: flux-operator
    namespace: flux-system
    inherit:
      - template: default
    needs:
      - 'cert-manager/cert-manager'

  - name: flux-instance
    namespace: flux-system
    inherit:
      - template: default
    needs:
      - 'flux-system/flux-operator'
